<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>歌品性张力测试™</title>

<style>

body{
background:black;
color:#eee;
font-family:monospace;
max-width:900px;
margin:auto;
padding:30px;
overflow-x:hidden;
}

h1{
font-size:50px;
text-align:center;
animation:flicker .3s infinite alternate;
}

@keyframes flicker{
0%{opacity:.7}
100%{opacity:1}
}

.desc{
text-align:center;
opacity:.5;
margin-bottom:50px;
}

.question{

border:1px solid #222;
padding:20px;
margin:30px 0;
background:#080808;

}

label{

display:block;
margin:12px;
cursor:pointer;

}

button{

width:100%;
padding:20px;
font-size:20px;
border:none;
cursor:pointer;

}

#result{

margin-top:50px;
font-size:25px;
white-space:pre-line;
line-height:1.8;

}

</style>
</head>

<body>

<h1>
歌品性张力测试™
</h1>

<div class="desc">

12题 / 百分制

检测：

云雾指数｜地下浓度｜综艺说唱污染｜现实适配能力

</div>


<div id="quiz"></div>

<button onclick="calc()">
提交人格样本
</button>

<div id="result"></div>

<script>
    function calc() {  
        alert("JS正在运行");}

document.getElementById("quiz").innerHTML = `
    <h2>第二步已进入</h2>
    <p>这里是下一步内容</p>
    <button onclick="alert('第三步')">继续</button>
  `;

  document.getElementById("result").innerHTML = "";
}

const q=[]
<script>
  
["看到别人偶像是女团和刘亦菲，你：",

["尊重",2],

["冷笑",5],

["质疑TA的审美 并拉黑",8],

["掏出鸡鸡插TA嘴里然后告诉TA蛋姐才是最牛逼的",12]

],


["深夜2点听云雾说唱时：",

["和蛋姐艹B",1],

["被蛋姐口鸡巴",5],

["突然想用手解决",10],

["蛋姐牙掉了",12]

],


["如果蛋姐听综艺说唱：",

["挺好",2],

["无所谓",5],

["斟酌一下",8],

["更兴奋了",12]

],


["你必须在其中选出一个女人陪你渡过难捱的夜晚：",

["蛋姐",2],

["于姐",6],

["李好",10],

["klay137",12]

],


["你最希望什么在你生活里出现：",

["蛋姐的B",1],

["于姐的脚",5],

["李好的奶子",10],

["传人狠辣的地下室调教",12]

],


["蛋姐出轨了，你：",

["当然是选择原谅她",2],

["吊起来抽打三天三夜",5],

["自己跪在一边看着撸管",8],

["祝她好",12]

],


["蛋姐最夯的部位是：",

["奶子",1],

["屁股",6],

["B",10],

["脚",12]

],


["蛋姐得脚气时：",

["把她脚砍了",2],

["帮她涂抹口水",6],

["想舔干净",10],

["想让鸡鸡染上脚气",12]

],


["谁是克隆人：",

["迈克尔杰克逊",2],

["坎耶韦斯特",5],

["科比布莱恩特",10],

["金凯瑞",12]

],


["最符合你的状态：",

["射精狂人",2],

["蛋姐的狗",6],

["于姐的肉便器",10],

["她们两个的主人",12]

],


["早安的一年：",

["每天都在射精",2],

["一个星期两次",5],

["一个月两次",10],

["阳痿了",12]

],


["终极问题：

最想插蛋姐哪里：",

["B",1],

["嘎子窝",5],

["屁股扣",10],

["足穴",12]

]

];



let html="";


q.forEach((x,i)=>{

html+=`

<div class="question">

<h3>

${i+1}.
${x[0]}

</h3>


${x.slice(1).map(a=>`

<label>

<input
type="radio"
name=q${i}
value=${a[1]}>

${a[0]}

</label>

`).join("")}

</div>

`;

});


quiz.innerHTML=html;



function calc(){

let total=0;

for(let i=0;i<q.length;i++){

let c=
document.querySelector(
`input[name=q${i}]:checked`
);

if(c)
total+=+c.value;

}


let score=
Math.round(
(total/144)*100
);


let r="";


if(score<20)

r=`

【13分】

泥巴人格

对蛋姐的魅力一无所知

于姐仍接受你


`;

else if(score<40)

r=`

【67分】

梅毒感染期

开始出现：

看到蛋姐会硬 症状


`;

else if(score<60)

r=`

【69分】

蛋姐的狗

会因为蛋姐没洗脚感到开心


`;

else if(score<80)

r=`

【78分】

高浓度淫犬

凌晨3点撸管时

被突然出现的蛋姐榨干


`;

else if(score<95)

r=`

【91分】

已经可以熟练游龙于姐的嘎子窝
同时强奸蛋姐


`;

else

r=`

【2778分】

无法归档

医院：

艾滋病治不了

社会：

建议和蛋姐一起送去印度

`;


result.innerText=

`

总分：

${score}/100


${r}


检测结论：

你的存在已影响现实结构。

`;

}

</script>

</body>
</html>
